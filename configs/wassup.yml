server:
  port: 5000

ui:
  theme: light
  pages:
    - title: Home
      path: /
      columns:
        - size: 2
          widgets:
            - type: weather
              location: Tokyo
        - size: 7
          widgets:
            - type: tabs
              labels:
                - Tokyo
                - Paris
              widgets:
                - type: weather
                  location: Tokyo
                - type: weather
                  location: Paris
        - size: 3
          widgets:
            - type: weather
              location: Ho Chi Minh City
    - title: News
      path: /news
      columns:
        - size: 3
          widgets:
            - type: weather
              location: Ho Chi Minh City
