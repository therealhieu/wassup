services:
  postgres:
    image: postgres:17.4-alpine
    container_name: wassup-db
    environment:
      POSTGRES_DB: wassup
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  wassup:
    container_name: wassup
    build: .
    ports:
      - "2506:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/wassup
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pg-data:
